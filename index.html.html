<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学基礎 ① 物質の構成 — 学習プログラム</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #FFF7ED 0%, #FEF3C7 30%, #DBEAFE 70%, #EDE9FE 100%);
    min-height: 100vh;
    color: #111;
    line-height: 1.6;
  }
  button { font-family: inherit; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  .header {
    background: linear-gradient(135deg, #fff, #fef3c7);
    border-radius: 24px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,.08);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,.27), transparent);
  }
  .header::after {
    content: ''; position: absolute; bottom: -40px; left: -20px;
    width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle, rgba(96,165,250,.2), transparent);
  }
  .header-inner { position: relative; }
  .header-tag { font-size: 13px; color: #888; letter-spacing: 2px; margin-bottom: 4px; }
  .header-title {
    font-size: 30px; font-weight: 900; margin: 0;
    background: linear-gradient(135deg, #F59E0B, #EC4899, #8B5CF6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-sub { font-size: 14px; color: #666; margin-top: 6px; }
  .stat-row { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .stat-card {
    background: #fff; border-radius: 12px; padding: 12px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05); flex: 1; min-width: 140px;
  }
  .stat-label { font-size: 11px; color: #999; }
  .stat-val { font-size: 22px; font-weight: 800; }
  .stat-val.amber { color: #F59E0B; }
  .stat-val.purple { color: #8B5CF6; }
  .stat-bar { height: 6px; background: #F3F4F6; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: linear-gradient(90deg, #F59E0B, #EC4899); transition: width .5s; }

  .settings {
    background: #fff; border-radius: 14px; padding: 12px 16px;
    margin-bottom: 16px; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .settings-label { font-weight: 700; color: #555; }
  .toggle-wrap { display: flex; gap: 4px; background: #F3F4F6; border-radius: 999px; padding: 3px; }
  .toggle-opt {
    border: none; background: transparent; padding: 6px 14px;
    border-radius: 999px; font-size: 12px; font-weight: 700; color: #888; cursor: pointer;
    transition: all .2s;
  }
  .toggle-opt.active {
    background: #fff; color: #F59E0B;
    box-shadow: 0 2px 6px rgba(245,158,11,.3);
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .unit-card {
    background: #fff; border-radius: 18px; padding: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .unit-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
  .unit-card.passed { border-color: var(--unit-color); }
  .unit-card-blob {
    position: absolute; top: -20px; right: -20px;
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--unit-bg); opacity: .55;
  }
  .unit-card-inner { position: relative; }
  .unit-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .unit-symbol {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 20px;
    box-shadow: 0 3px 8px var(--unit-glow);
  }
  .unit-idx { font-size: 11px; color: #999; letter-spacing: 1px; }
  .unit-name { font-size: 17px; font-weight: 800; }
  .unit-intro { font-size: 12px; color: #666; margin: 6px 0 12px; line-height: 1.6; }
  .unit-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; font-size: 11px; }
  .stat-chip {
    background: #F9FAFB; padding: 3px 10px; border-radius: 999px;
    color: #666; border: 1px solid #E5E7EB;
  }
  .stat-chip.passed { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }
  .stat-chip.steps { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }
  .start-btn {
    width: 100%; border: none; padding: 10px 14px; border-radius: 10px;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
    box-shadow: 0 3px 10px var(--unit-glow);
    transition: transform .15s;
  }
  .start-btn:hover { transform: translateY(-1px); }
  .mark-row { display: flex; gap: 6px; margin-top: 8px; }
  .mark-btn {
    flex: 1; border: 2px solid #E5E7EB; background: #fff;
    padding: 5px 0; border-radius: 8px; font-size: 11px; font-weight: 700;
    color: #999; cursor: pointer;
  }
  .mark-btn.active.A { background: #10B981; color: #fff; border-color: #10B981; }
  .mark-btn.active.B { background: #F59E0B; color: #fff; border-color: #F59E0B; }
  .mark-btn.active.C { background: #EF4444; color: #fff; border-color: #EF4444; }

  .footer { text-align: center; color: #aaa; font-size: 11px; margin-top: 30px; }

  .back-btn {
    background: #fff; border: none; padding: 8px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 700; color: #666; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 14px;
  }
  .back-btn:hover { color: #111; }
  .unit-header {
    background: #fff; border-radius: 20px; padding: 22px 26px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06); margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .unit-header::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 120px; height: 120px; border-radius: 50%;
    background: var(--unit-bg); opacity: .6;
  }
  .unit-header-inner { position: relative; display: flex; gap: 16px; align-items: center; }
  .unit-header-symbol {
    width: 60px; height: 60px; border-radius: 14px;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 28px;
    box-shadow: 0 4px 14px var(--unit-glow);
  }
  .unit-header-title { font-size: 22px; font-weight: 900; margin: 0; }
  .unit-header-sub { font-size: 12px; color: #888; margin-top: 2px; }

  .tabs {
    display: flex; gap: 6px; background: rgba(255,255,255,.7);
    padding: 6px; border-radius: 14px; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.04);
  }
  .tab {
    flex: 1; border: none; padding: 10px 12px; border-radius: 10px;
    background: transparent; font-size: 13px; font-weight: 700; color: #888;
    cursor: pointer; transition: all .2s;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; box-shadow: 0 3px 10px var(--unit-glow);
  }

  .step-progress {
    background: #fff; border-radius: 14px; padding: 14px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05); margin-bottom: 14px;
  }
  .step-progress-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-size: 13px;
  }
  .step-progress-title { font-weight: 700; color: #555; }
  .step-progress-count { color: #999; font-size: 12px; }
  .step-bar { height: 8px; background: #F3F4F6; border-radius: 4px; overflow: hidden; }
  .step-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--unit-color), var(--unit-color-d));
    transition: width .5s ease;
  }
  .step-dots { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #E5E7EB;
    background: #fff; font-size: 11px; font-weight: 700; color: #aaa;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .step-dot.done { background: var(--unit-color); color: #fff; border-color: var(--unit-color); }
  .step-dot.current {
    border-color: var(--unit-color);
    color: var(--unit-color);
    box-shadow: 0 0 0 4px var(--unit-glow);
  }

  .step-card {
    background: #fff; border-radius: 18px; padding: 24px 26px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06); margin-bottom: 14px;
  }
  .step-num {
    display: inline-block; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; color: var(--unit-color);
    background: var(--unit-bg); padding: 3px 12px; border-radius: 999px;
    margin-bottom: 10px;
  }
  .step-heading { font-size: 19px; font-weight: 800; margin: 0 0 12px; }
  .step-body { font-size: 15px; color: #333; line-height: 1.85; white-space: pre-wrap; }
  .step-body strong { color: var(--unit-color-d); font-weight: 800; }
  .term-pill {
    display: inline-block;
    background: var(--unit-bg); border: 1px solid var(--unit-color);
    color: var(--unit-color-d); font-weight: 700;
    padding: 2px 12px; border-radius: 999px; font-size: 14px;
    margin: 0 4px;
  }
  .info-box {
    background: #EFF6FF; border-left: 4px solid #3B82F6;
    padding: 12px 16px; margin: 14px 0; border-radius: 0 8px 8px 0;
    font-size: 14px;
  }
  .info-box strong { color: #1E40AF; }
  .tip-box {
    background: #FEF3C7; border: 1px dashed #F59E0B;
    padding: 12px 16px; margin: 14px 0; border-radius: 8px;
    font-size: 14px;
  }
  .tip-box::before { content: "💡 "; }
  .warn-box {
    background: #FEE2E2; border-left: 4px solid #EF4444;
    padding: 12px 16px; margin: 14px 0; border-radius: 0 8px 8px 0;
    font-size: 14px;
  }
  .warn-box strong { color: #991B1B; }
  .warn-box::before { content: "⚠️ "; }

  .tree {
    background: #FAFAFA; border-radius: 12px; padding: 18px;
    margin: 14px 0; font-size: 14px;
  }
  .tree-grid {
    display: grid;
    grid-template-columns: 70px 90px 100px 1fr;
    gap: 10px; align-items: center;
  }
  .tree-grid > div { padding: 6px 8px; }
  .tree-node {
    color: #fff; text-align: center; font-weight: 800;
    border-radius: 8px; font-size: 13px;
  }
  .tree-node.root { background: #374151; }
  .tree-node.mix { background: #EF4444; }
  .tree-node.pure { background: #3B82F6; }
  .tree-node.elem { background: #10B981; }
  .tree-node.comp { background: #8B5CF6; }

  .ministep {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 2px dashed #E5E7EB;
  }
  .ministep-toggle-btn {
    width: 100%; border: 2px solid var(--unit-color);
    background: #fff; color: var(--unit-color-d);
    padding: 12px; border-radius: 12px; font-weight: 800; font-size: 14px;
    cursor: pointer; transition: all .2s;
  }
  .ministep-toggle-btn:hover {
    background: var(--unit-bg);
  }
  .ministep-title {
    font-size: 13px; font-weight: 800; color: var(--unit-color-d);
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .ministep-title::before { content: "✏️ "; }

  .miniq {
    background: #FAFAFA; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px;
  }
  .miniq-text {
    font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.7;
  }
  .miniq-options { display: flex; flex-direction: column; gap: 6px; }
  .miniq-opt {
    background: #fff; border: 2px solid #E5E7EB; padding: 9px 14px;
    border-radius: 10px; cursor: pointer; font-size: 14px;
    transition: all .15s;
    text-align: left;
    display: flex; align-items: center; gap: 8px;
  }
  .miniq-opt:hover { border-color: var(--unit-color); }
  .miniq-opt.selected { border-color: var(--unit-color); background: var(--unit-bg); }
  .miniq-opt.correct { border-color: #10B981; background: #D1FAE5; font-weight: 700; }
  .miniq-opt.incorrect { border-color: #EF4444; background: #FEE2E2; }
  .miniq-mark {
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 1px solid #D1D5DB;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #666;
    flex-shrink: 0;
  }
  .miniq-fill input {
    border: none; border-bottom: 2px solid var(--unit-color);
    background: var(--unit-bg);
    padding: 4px 8px; font-size: 14px; font-weight: 700;
    color: var(--unit-color-d); width: 110px; text-align: center;
    border-radius: 4px 4px 0 0;
  }
  .miniq-fill input:focus { outline: none; }
  .miniq-fill input.correct {
    background: #D1FAE5; border-bottom-color: #10B981; color: #065F46;
  }
  .miniq-fill input.incorrect {
    background: #FEE2E2; border-bottom-color: #EF4444; color: #991B1B;
  }
  .ministep-bank {
    background: #fff; border: 2px dashed #E5E7EB; border-radius: 10px;
    padding: 10px; margin-bottom: 12px; display: flex; gap: 6px; flex-wrap: wrap;
    min-height: 50px;
    align-items: center;
  }
  .ministep-bank-label {
    width: 100%; font-size: 10px; letter-spacing: 1px; color: #aaa;
    font-weight: 700; margin-bottom: 4px;
  }
  .ministep-chip {
    background: var(--unit-bg); color: var(--unit-color-d);
    border: 1px solid var(--unit-color);
    padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 700;
    cursor: pointer; user-select: none;
    transition: all .15s;
  }
  .ministep-chip:hover { transform: translateY(-1px); }
  .ministep-chip.used { opacity: .25; pointer-events: none; text-decoration: line-through; }
  .ministep-chip.selected {
    background: var(--unit-color); color: #fff;
    box-shadow: 0 2px 8px var(--unit-glow);
  }

  .ministep-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .ministep-btn {
    border: none; padding: 9px 18px; border-radius: 10px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    transition: transform .15s;
  }
  .ministep-btn:hover { transform: translateY(-1px); }
  .ministep-btn.primary {
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff;
    box-shadow: 0 3px 10px var(--unit-glow);
  }
  .ministep-btn.secondary {
    background: #F3F4F6; color: #555;
  }
  .ministep-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

  .ministep-result {
    margin-top: 10px; padding: 12px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 700;
    text-align: center;
  }
  .ministep-result.success {
    background: #D1FAE5; color: #065F46; border: 2px solid #10B981;
  }
  .ministep-result.fail {
    background: #FEE2E2; color: #991B1B; border: 2px solid #EF4444;
  }

  .next-step-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; border: none; padding: 14px;
    border-radius: 12px; font-weight: 800; font-size: 15px;
    cursor: pointer; box-shadow: 0 4px 14px var(--unit-glow);
    margin-top: 12px;
    transition: transform .15s;
  }
  .next-step-btn:hover { transform: translateY(-2px); }
  .next-step-btn::after { content: " →"; }

  .practice-card {
    background: #fff; border-radius: 18px; padding: 22px 26px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
  }
  .practice-head {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
  }
  .practice-head h2 { margin: 0; font-size: 20px; }
  .timer-display {
    background: #1F2937; color: #FCD34D;
    padding: 8px 18px; border-radius: 999px;
    font-family: "JetBrains Mono", monospace, sans-serif;
    font-weight: 700; font-size: 16px; letter-spacing: 1px;
  }
  .timer-display.paused { background: #6B7280; color: #fff; }

  .fill-text {
    background: #FAFAFA; border-radius: 12px; padding: 22px 24px;
    font-size: 15px; line-height: 2.4; margin-bottom: 16px;
  }
  .blank {
    display: inline-block; min-width: 90px; height: 30px;
    border-bottom: 2px dashed var(--unit-color);
    background: #FFFBEB; padding: 1px 10px;
    margin: 0 3px; vertical-align: middle; text-align: center;
    font-weight: 700; color: var(--unit-color-d); cursor: pointer;
    font-size: 14px;
    transition: all .2s;
  }
  .blank:hover { background: var(--unit-bg); }
  .blank.filled { background: var(--unit-bg); border-bottom-style: solid; }
  .blank.correct { background: #D1FAE5; border-bottom-color: #10B981; color: #065F46; }
  .blank.wrong {
    background: #FEE2E2; border-bottom-color: #EF4444; color: #991B1B;
    animation: shake .4s;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  .word-bank {
    background: #FAFAFA; border-radius: 12px; padding: 14px;
    margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 60px; align-items: center;
  }
  .word-bank-label {
    width: 100%; font-size: 11px; letter-spacing: 1px; color: #999;
    font-weight: 700; margin-bottom: 4px;
  }
  .word-chip {
    background: #fff; border: 2px solid var(--unit-color);
    color: var(--unit-color-d);
    padding: 7px 14px; border-radius: 999px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
    transition: all .15s;
  }
  .word-chip:hover { transform: translateY(-1px); box-shadow: 0 3px 10px var(--unit-glow); }
  .word-chip.used { opacity: .25; pointer-events: none; text-decoration: line-through; }
  .word-chip.selected {
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff;
  }

  .practice-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .action-btn {
    border: none; padding: 10px 22px; border-radius: 12px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    transition: transform .15s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--unit-color), var(--unit-color-d));
    color: #fff; box-shadow: 0 3px 10px var(--unit-glow);
  }
  .action-btn.secondary { background: #F3F4F6; color: #555; }

  .records-card {
    background: #fff; border-radius: 18px; padding: 18px 22px;
    box-shadow: 0 4px 14px rgba(0,0,0,.06); margin-top: 14px;
  }
  .records-card h3 { margin: 0 0 12px; font-size: 15px; color: #555; }
  .record-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
  .record-list li {
    display: grid; grid-template-columns: 50px 1fr auto;
    align-items: center; padding: 8px 14px;
    background: #FAFAFA; border-radius: 8px;
    font-family: "JetBrains Mono", monospace, sans-serif;
    font-size: 13px;
  }
  .record-list li:nth-child(1) { background: linear-gradient(90deg, #FEF3C7 0%, #FAFAFA 100%); }
  .record-list li:nth-child(2) { background: linear-gradient(90deg, #F3F4F6 0%, #FAFAFA 100%); }
  .record-list li:nth-child(3) { background: linear-gradient(90deg, #FED7AA 0%, #FAFAFA 100%); }
  .record-list .rank { font-weight: 800; color: var(--unit-color-d); }
  .record-list .date { color: #aaa; font-size: 11px; }
  .record-empty { color: #aaa; text-align: center; padding: 14px; font-size: 12px; }

  .quiz-question {
    background: #fff; border-radius: 14px; padding: 18px 22px;
    margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.04);
  }
  .qnum {
    display: inline-block; background: var(--unit-color); color: #fff;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 999px; letter-spacing: 1px; margin-bottom: 8px;
  }
  .qtext { font-size: 15px; margin-bottom: 12px; line-height: 1.7; }
  .qopts { display: flex; flex-direction: column; gap: 6px; }
  .qopt {
    background: #FAFAFA; border: 2px solid transparent;
    padding: 10px 14px; border-radius: 10px; cursor: pointer;
    font-size: 14px; transition: all .15s;
    display: flex; align-items: center; gap: 10px;
    text-align: left; width: 100%;
  }
  .qopt:hover { background: #fff; border-color: var(--unit-color); }

      { type:'choice', q:'純粋な氷が融解している間、温度は?', options:['上昇する','0℃のまま一定','100℃のまま一定','下降する'], answer:1 },
      { type:'choice', q:'状態変化中に温度が変わらないのはなぜか。', options:['熱が逃げているから','加えた熱が粒子の配列変化や結合切断に使われるから','温度計が壊れているから','室温と同じになるから'], answer:1 },
      { type:'fill', q:'水の融点は{0}℃、沸点は{1}℃である(1気圧のとき)。', answers:['0','100'], bank:['0','100','273','373','-273'] },

      { type:'choice', q:'物質が自然に全体に広がっていく現象を何というか。', options:['熱運動','拡散','蒸発','凝縮'], answer:1 },

      { type:'qa', front:'物質の三態とは?', back:'固体・液体・気体の3つの状態。\n温度や圧力によって相互に変化する。' },
      { type:'qa', front:'融解 / 凝固', back:'融解=固体→液体(温度:融点)\n凝固=液体→固体(温度:凝固点)' },
      { type:'qa', front:'蒸発 / 沸騰 / 凝縮', back:'蒸発=液体→気体(表面から、何℃でも)\n沸騰=液体→気体(内部から、沸点で)\n凝縮=気体→液体' },

      { type:'term', front:'状態変化中の温度', back:'温度は一定(変わらない)', mistake:'なぜ?→加えた熱は[bold:粒子の配列をくずす(融解)]や[bold:粒子間の結合を切る(蒸発)]ために使われ、運動エネルギー(=温度)には変わらない。' },
      { type:'term', front:'蒸発熱 vs 融解熱', back:'水の蒸発熱は融解熱の[bold:約7倍]', mistake:'なぜ?→融解は位置の変化、蒸発は分子間力を完全に切り離す必要があるため、より多くのエネルギーが必要。' },
      { type:'term', front:'蒸発と沸騰の違い', back:'蒸発=表面から、何℃でも起こる / 沸騰=内部から、沸点で起こる', mistake:'洗濯物が乾くのは「蒸発」(沸騰ではない)。区別を意識しよう。' },
      { type:'qa', front:'熱運動とは?', back:'物質を構成する粒子の不規則な運動。\n温度が高いほど活発になる。' },
      { type:'qa', front:'拡散とは?', back:'物質が自然に全体に広がっていく現象。\n例:水中のインク、部屋の香水の匂い、ビンの中の臭素気体' },
      { type:'qa', front:'絶対零度とは?', back:'理論上、粒子の運動が停止する温度。-273℃(=0 K)。\nこれ以下の温度はない。' },
      { type:'term', front:'絶対温度の換算式', back:'T(K) = t(℃) + 273', mistake:'プラス273を忘れない!\n0℃=273 K、100℃=373 K、27℃=300 K' },
      { type:'qa', front:'純物質と混合物の見分け方(熱)', back:'純物質→沸点・融点が一定\n混合物→温度が一定にならない\n海水が-2℃でも凍らないのはこのため。' }
    ]
  }
];

// ============================================================
// State + Storage
// ============================================================
const STORAGE_KEY = 'chem-basic-progress-v1';
const SETTINGS_KEY = 'chem-basic-settings-v1';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveProgress(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
}
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { miniTestMode:'auto' }; }
  catch(e) { return { miniTestMode:'auto' }; }
}
function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
}

let state = {
  progress: loadProgress(),
  settings: loadSettings(),
  view: 'dashboard',
  activeUnit: null,
  tab: 'learn',
  currentStep: 0,
  miniTestVisible: {},
  miniTestSelected: {},
  miniTestPickedChip: {},
  miniTestJudged: {},
  miniTestPassed: {},
  practicePickedChip: null,
  startTime: 0,
  elapsed: 0,
  timerId: null,
  timerPaused: false,
  testSelected: {},
  testPickedChip: null,
  testJudged: false,
  // Flashcard state
  flashDeck: [],          // 現在のデッキ (カードオブジェクトの配列)
  flashIndex: 0,          // 現在のカードのインデックス
  flashFlipped: false,    // 表/裏
  flashMode: 'all',       // 'all' or 'review' (もう一度のみ)
  flashKnown: new Set(),  // 「覚えた」と分類されたカードID
  flashReview: new Set(), // 「もう一度」と分類されたカードID
  flashSummaryMode: false,// true なら全単元横断モード
  flashSpeed: 'manual',   // 'manual' | 2 | 3 | 4 | 5 (秒)
  flashLoop: false,       // 1周終わったらループするか
  flashPlaying: false,    // 自動再生中か
  flashTimerId: null      // 自動再生のタイマーID
};

function getProg(unitId) {
  return state.progress[unitId] || { steps:{}, passed:false, mark:null, bestTimes:[], flashKnown:[], flashReview:[] };
}
function updateProg(unitId, patch) {
  const cur = getProg(unitId);
  state.progress[unitId] = { ...cur, ...patch };
  saveProgress(state.progress);
}

function formatBody(text) {
  return text
    .replace(/\[term:([^\]]+)\]/g, '<span class="term-pill">$1</span>')
    .replace(/\[bold:([^\]]+)\]/g, '<strong>$1</strong>')
    .replace(/\[tip:([^\]]+)\]/g, '<div class="tip-box">$1</div>')
    .replace(/\[warn:([^\]]+)\]/g, '<div class="warn-box">$1</div>')
    .replace(/\[info:([^\]]+)\]/g, '<div class="info-box">$1</div>');
}

function formatTime(sec) {
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = (sec%60).toFixed(1).padStart(4,'0');
  return `${m}:${s}`;
}

function fireConfetti() {
  const colors = ['#F59E0B','#EC4899','#3B82F6','#10B981','#8B5CF6','#FCD34D'];
  for (let i=0; i<60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + '%';
    el.style.background = colors[i%colors.length];
    el.style.borderRadius = (i%2===0) ? '50%' : '2px';
    const dur = 2 + Math.random()*2;
    const delay = Math.random()*0.5;
    el.style.animation = `fall ${dur}s ${delay}s ease-in forwards`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), (dur+delay)*1000+200);
  }
}

function showModal(opts) {
  document.getElementById('modal').className = 'modal-bg show';
  const inner = document.getElementById('modalInner');
  inner.className = 'modal ' + (opts.type||'');
  document.getElementById('modalTitle').textContent = opts.title || '';
  document.getElementById('modalBody').innerHTML = opts.body || '';
  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';
  (opts.buttons||[]).forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'modal-btn ' + (b.primary ? 'primary' : 'secondary');
    btn.textContent = b.label;
    btn.onclick = b.action;
    actions.appendChild(btn);
  });
}
function closeModal() { document.getElementById('modal').className = 'modal-bg'; }

function render() {
  if (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'summary') renderSummary();
  else renderUnit();
}

function renderDashboard() {
  const totalSteps = UNITS.reduce((s,u) => s + u.steps.length, 0);
  const doneSteps = UNITS.reduce((s,u) => {
    const p = getProg(u.id);
    return s + Object.values(p.steps||{}).filter(v=>v).length;
  }, 0);
  const passedUnits = UNITS.filter(u => getProg(u.id).passed).length;
  const pct = totalSteps > 0 ? Math.round(doneSteps/totalSteps*100) : 0;

  let html = '<div class="container">';
  html += `
    <div class="header">
      <div class="header-inner">
        <div class="header-tag">CHEMISTRY BASIC ／ 化学基礎</div>
        <h1 class="header-title">物質の構成</h1>
        <div class="header-sub">純物質・混合物 / 分離精製 / 元素 / 同素体 / 物質の三態</div>
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-label">学習進捗</div>
            <div class="stat-val amber">${doneSteps} / ${totalSteps} <span style="font-size:12px;color:#888;">ステップ</span></div>
            <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">合格単元</div>
            <div class="stat-val purple">${passedUnits} / ${UNITS.length} <span style="font-size:12px;color:#888;">単元</span></div>
          </div>
        </div>
      </div>
    </div>
  `;

  html += `
    <div class="settings">
      <span class="settings-label">⚙ ステップごとのミニテスト</span>
      <div class="toggle-wrap">
        <button class="toggle-opt ${state.settings.miniTestMode==='auto'?'active':''}" onclick="setMiniMode('auto')">自動表示</button>
        <button class="toggle-opt ${state.settings.miniTestMode==='button'?'active':''}" onclick="setMiniMode('button')">ボタン式</button>
      </div>
      <span style="color:#aaa;font-size:11px;">${state.settings.miniTestMode==='auto'?'説明文の下に自動で出ます':'ボタンを押すと出ます'}</span>
    </div>
  `;

  html += '<div class="grid">';
  UNITS.forEach((u, i) => {
    const p = getProg(u.id);
    const cssVars = `--unit-color:${u.color};--unit-color-d:${u.colorD};--unit-bg:${u.bgColor};--unit-glow:${u.color}66`;
    const stepsDone = Object.values(p.steps||{}).filter(v=>v).length;
    html += `
      <div class="unit-card ${p.passed?'passed':''}" style="${cssVars}" onclick="openUnit('${u.id}')">
        <div class="unit-card-blob"></div>
        <div class="unit-card-inner">
          <div class="unit-head">
            <div class="unit-symbol">${u.symbol}</div>
            <div>
              <div class="unit-idx">単元 ${i+1}</div>
              <div class="unit-name">${u.name}</div>
            </div>
          </div>
          <div class="unit-intro">${u.intro}</div>
          <div class="unit-stats">
            <span class="stat-chip steps">📚 ${stepsDone}/${u.steps.length} ステップ</span>
            ${p.passed ? '<span class="stat-chip passed">✓ 合格</span>' : ''}
          </div>
          <button class="start-btn">学習を開始 →</button>
          <div class="mark-row" onclick="event.stopPropagation()">
            <button class="mark-btn A ${p.mark==='A'?'active':''}" onclick="setMark('${u.id}','A')">😊 OK</button>
            <button class="mark-btn B ${p.mark==='B'?'active':''}" onclick="setMark('${u.id}','B')">🤔 微妙</button>
            <button class="mark-btn C ${p.mark==='C'?'active':''}" onclick="setMark('${u.id}','C')">😣 苦手</button>
          </div>
        </div>
      </div>
    `;
  });

  // 全体まとめフラッシュカード(全単元)
  const totalCards = UNITS.reduce((s,u) => s + (u.flashcards?.length || 0), 0);
  const cssVarsAll = `--unit-color:#8B5CF6;--unit-color-d:#6D28D9;--unit-bg:#EDE9FE;--unit-glow:#8B5CF666`;
  html += `
    <div class="unit-card" style="${cssVarsAll}" onclick="openSummaryFlash()">
      <div class="unit-card-blob"></div>
      <div class="unit-card-inner">
        <div class="unit-head">
          <div class="unit-symbol">📇</div>
          <div>
            <div class="unit-idx">SUMMARY</div>
            <div class="unit-name">全体まとめ</div>
          </div>
        </div>
        <div class="unit-intro">全単元の重要ポイント・ミスしがちな箇所をフラッシュカードで横断的に復習。試験前の総ざらいに最適。</div>
        <div class="unit-stats">
          <span class="stat-chip steps">📇 ${totalCards} 枚のカード</span>
        </div>
        <button class="start-btn">フラッシュカードを開く →</button>
      </div>
    </div>
  `;
  html += '</div>';

  html += '<div class="footer">化学基礎 ① 物質の構成 / 全7単元</div>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function setMiniMode(mode) {
  state.settings.miniTestMode = mode;
  saveSettings(state.settings);
  render();
}

function setMark(unitId, mark) {
  const cur = getProg(unitId).mark;
  updateProg(unitId, { mark: cur === mark ? null : mark });
  render();
}

function openUnit(unitId) {
  state.activeUnit = unitId;
  state.view = 'unit';
  state.tab = 'learn';
  state.currentStep = 0;
  state.flashSummaryMode = false;
  state.flashMode = 'all';
  state.miniTestVisible = {};
  state.miniTestSelected = {};
  state.miniTestJudged = {};
  state.miniTestPassed = {};
  state.miniTestPickedChip = {};
  const p = getProg(unitId);
  const u = UNITS.find(x=>x.id===unitId);
  for (let i=0; i<u.steps.length; i++) {
    if (!(p.steps||{})[i]) { state.currentStep = i; break; }
    if (i === u.steps.length-1) state.currentStep = i;
  }
  render();
  window.scrollTo(0,0);
}

function backToDashboard() {
  stopTimer();
  pauseFlashPlay();
  state.view = 'dashboard';
  state.flashSummaryMode = false;
  render();
}

function renderUnit() {
  const u = UNITS.find(x => x.id === state.activeUnit);
  if (!u) return renderDashboard();
  const p = getProg(u.id);
  const cssVars = `--unit-color:${u.color};--unit-color-d:${u.colorD};--unit-bg:${u.bgColor};--unit-glow:${u.color}66`;

  let html = `<div class="container" style="${cssVars}">`;
  html += `<button class="back-btn" onclick="backToDashboard()">← 単元表に戻る</button>`;
  html += `
    <div class="unit-header">
      <div class="unit-header-inner">
        <div class="unit-header-symbol">${u.symbol}</div>
        <div>
          <h2 class="unit-header-title">${u.name}</h2>
          <div class="unit-header-sub">${u.intro}</div>
        </div>
      </div>
    </div>
  `;
  html += `
    <div class="tabs">
      <button class="tab ${state.tab==='learn'?'active':''}" onclick="setTab('learn')">📖 学習</button>
      <button class="tab ${state.tab==='flash'?'active':''}" onclick="setTab('flash')">📇 カード</button>
      <button class="tab ${state.tab==='practice'?'active':''}" onclick="setTab('practice')">✏️ 練習</button>
      <button class="tab ${state.tab==='test'?'active':''}" onclick="setTab('test')">📝 確認テスト</button>
    </div>
  `;

  if (state.tab === 'learn') html += renderLearnTab(u, p);
  else if (state.tab === 'flash') html += renderFlashTab(u, p);
  else if (state.tab === 'practice') html += renderPracticeTab(u, p);
  else html += renderTestTab(u, p);

  html += '</div>';
  document.getElementById('app').innerHTML = html;

  if (state.tab === 'learn') attachMiniTestHandlers(u);
  if (state.tab === 'practice') attachPracticeHandlers(u);
  if (state.tab === 'test') attachTestHandlers(u);
}

function setTab(tab) {
  if (state.tab === 'practice' && tab !== 'practice') stopTimer();
  if (state.tab === 'flash' && tab !== 'flash') {
    pauseFlashPlay();
  }
  state.tab = tab;
  if (tab === 'practice') {
    resetPractice();
    return; // resetPractice calls render
  }
  if (tab === 'test') {
    state.testSelected = {};
    state.testPickedChip = null;
    state.testJudged = false;
  }
  if (tab === 'flash') {
    initFlashDeck();
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// LEARN TAB
// ============================================================
function renderLearnTab(u, p) {
  const stepsDone = Object.keys(p.steps||{}).filter(k => (p.steps||{})[k]).length;
  const progressPct = Math.round(stepsDone / u.steps.length * 100);
  const stepIdx = state.currentStep;
  const step = u.steps[stepIdx];

  let html = '';
  html += `
    <div class="step-progress">
      <div class="step-progress-head">
        <span class="step-progress-title">学習ステップ</span>
        <span class="step-progress-count">${stepsDone} / ${u.steps.length} 完了</span>
      </div>
      <div class="step-bar"><div class="step-bar-fill" style="width:${progressPct}%"></div></div>
      <div class="step-dots">
        ${u.steps.map((s,i) => {
          const done = (p.steps||{})[i];
          const cls = done ? 'done' : (i===stepIdx ? 'current' : '');
          return `<span class="step-dot ${cls}" onclick="goToStep(${i})" title="${s.title}">${i+1}</span>`;
        }).join('')}
      </div>
    </div>
  `;

  html += `
    <div class="step-card">
      <span class="step-num">STEP ${stepIdx+1} / ${u.steps.length}</span>
      <h3 class="step-heading">${step.title}</h3>
      <div class="step-body">${formatBody(step.body)}</div>
      ${step.tree ? renderClassificationTree() : ''}
  `;

  if (step.miniTest && step.miniTest.length > 0) {
    const passed = state.miniTestPassed[stepIdx];
    const mode = state.settings.miniTestMode;
    const visible = mode === 'auto' || state.miniTestVisible[stepIdx] || passed;

    html += `<div class="ministep">`;
    if (!visible) {
      html += `
        <button class="ministep-toggle-btn" onclick="showMiniTest(${stepIdx})">
          ✏️ このステップの確認テストを始める (${step.miniTest.length}問)
        </button>
      `;
    } else {
      html += `<div class="ministep-title">このステップの確認 (${step.miniTest.length}問)</div>`;
      html += renderMiniTest(step, stepIdx);
    }
    html += `</div>`;
  } else {
    if (!(p.steps||{})[stepIdx]) {
      html += `<button class="next-step-btn" onclick="completeStep(${stepIdx})">次のステップへ進む</button>`;
    } else if (stepIdx < u.steps.length - 1) {
      html += `<button class="next-step-btn" onclick="goToStep(${stepIdx+1})">次のステップへ</button>`;
    }
  }

  html += `</div>`;

  if (stepsDone === u.steps.length) {
    html += `
      <div style="text-align:center; margin-top:18px;">
        <button class="action-btn primary" onclick="setTab('practice')" style="padding:14px 32px; font-size:15px;">
          ✏️ 練習問題に挑戦する →
        </button>
      </div>
    `;
  }

  return html;
}

function renderClassificationTree() {
  return `
    <div class="tree">
      <div class="tree-grid">
        <div class="tree-node root" style="grid-row: span 4;">物 質</div>
        <div class="tree-node mix">混合物</div>
        <div></div>
        <div>例: 空気、海水、食塩水、塩酸</div>

        <div class="tree-node pure" style="grid-row: span 3;">純物質</div>
        <div class="tree-node elem">単体</div>
        <div>1元素　例: O₂、Fe、Cu</div>

        <div class="tree-node comp">化合物</div>
        <div>2種以上の元素　例: H₂O、CO₂、NaCl</div>
      </div>
    </div>
  `;
}

function renderMiniTest(step, stepIdx) {
  let html = '';
  const fillQs = step.miniTest.filter(q => q.type === 'fill');
  if (fillQs.length > 0) {
    const allBank = [...new Set(fillQs.flatMap(q => q.bank || []))];
    html += `
      <div class="ministep-bank" data-step="${stepIdx}">
        <div class="ministep-bank-label">▸ 語群(タップして選択)</div>
        ${allBank.map(w => `<span class="ministep-chip" data-word="${w}">${w}</span>`).join('')}
      </div>
    `;
  }
  step.miniTest.forEach((q, qIdx) => {
    const key = `${stepIdx}_${qIdx}`;
    const selected = state.miniTestSelected[key];
    const judged = state.miniTestJudged[stepIdx];

    html += `<div class="miniq" data-q="${qIdx}">`;
    html += `<div class="miniq-text">問${qIdx+1}: ${q.q.replace(/\{(\d+)\}/g, (_,i) => {
      if (q.type === 'fill') {
        const idx = parseInt(i);
        const val = (selected && selected[idx]) || '';
        let cls = '';
        if (judged) {
          if (val === q.answers[idx]) cls = 'correct';
          else cls = 'incorrect';
        }
        return `<span class="miniq-fill"><input type="text" data-step="${stepIdx}" data-q="${qIdx}" data-blank="${idx}" value="${val}" readonly class="${cls}"></span>`;
      }
      return _;
    })}</div>`;

    if (q.type === 'choice') {
      html += `<div class="miniq-options">`;
      q.options.forEach((opt, i) => {
        let cls = 'miniq-opt';
        if (selected === i) cls += ' selected';
        if (judged) {
          if (i === q.answer) cls += ' correct';
          else if (selected === i) cls += ' incorrect';
        }
        html += `<button class="${cls}" data-step="${stepIdx}" data-q="${qIdx}" data-opt="${i}" ${judged?'disabled':''}>
          <span class="miniq-mark">${String.fromCharCode(65+i)}</span>${opt}
        </button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  if (!state.miniTestJudged[stepIdx]) {
    html += `
      <div class="ministep-actions">
        <button class="ministep-btn primary" onclick="judgeMiniTest(${stepIdx})">採点する</button>
      </div>
    `;
  } else if (state.miniTestPassed[stepIdx]) {
    html += `<div class="ministep-result success">🎉 全問正解!次のステップへ進めます</div>`;
    const u = UNITS.find(x=>x.id===state.activeUnit);
    if (stepIdx < u.steps.length - 1) {
      html += `<button class="next-step-btn" onclick="goToStep(${stepIdx+1})">次のステップへ</button>`;
    } else {
      html += `<div style="text-align:center;margin-top:14px;color:#666;font-size:13px;">全ステップ完了!練習問題に挑戦できます。</div>`;
    }
  } else {
    html += `<div class="ministep-result fail">もう少し!間違えたところを直して再挑戦しよう</div>`;
    html += `
      <div class="ministep-actions">
        <button class="ministep-btn primary" onclick="retryMiniTest(${stepIdx})">もう一度挑戦</button>
        <button class="ministep-btn secondary" onclick="reviewStep(${stepIdx})">説明を見直す</button>
      </div>
    `;
  }
  return html;
}

function showMiniTest(stepIdx) {
  state.miniTestVisible[stepIdx] = true;
  render();
}

function attachMiniTestHandlers(u) {
  document.querySelectorAll('.ministep-bank').forEach(bank => {
    const stepIdx = parseInt(bank.dataset.step);
    bank.querySelectorAll('.ministep-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        if (chip.classList.contains('used')) return;
        bank.querySelectorAll('.ministep-chip').forEach(c => c.classList.remove('selected'));
        if (state.miniTestPickedChip[stepIdx] === chip.dataset.word) {
          state.miniTestPickedChip[stepIdx] = null;
        } else {
          chip.classList.add('selected');
          state.miniTestPickedChip[stepIdx] = chip.dataset.word;
        }
      });
    });
  });

  document.querySelectorAll('.miniq input[data-blank]').forEach(inp => {
    inp.addEventListener('click', () => {
      const stepIdx = parseInt(inp.dataset.step);
      const qIdx = parseInt(inp.dataset.q);
      const blankIdx = parseInt(inp.dataset.blank);
      const key = `${stepIdx}_${qIdx}`;

      if (inp.value) {
        const word = inp.value;
        const stillUsedSomewhere = [...document.querySelectorAll(`input[data-step="${stepIdx}"]`)]
          .filter(o => o !== inp && o.value === word).length > 0;
        if (!stillUsedSomewhere) {
          const bank = document.querySelector(`.ministep-bank[data-step="${stepIdx}"]`);
          if (bank) {
            const chip = bank.querySelector(`.ministep-chip[data-word="${word}"]`);
            if (chip) chip.classList.remove('used');
          }
        }
        inp.value = '';
        inp.classList.remove('correct','incorrect');
        if (state.miniTestSelected[key]) state.miniTestSelected[key][blankIdx] = '';
        return;
      }

      const picked = state.miniTestPickedChip[stepIdx];
      if (!picked) return;
      inp.value = picked;
      const bank = document.querySelector(`.ministep-bank[data-step="${stepIdx}"]`);
      if (bank) {
        const chip = bank.querySelector(`.ministep-chip[data-word="${picked}"]`);
        if (chip) { chip.classList.add('used'); chip.classList.remove('selected'); }
      }
      state.miniTestPickedChip[stepIdx] = null;
      if (!state.miniTestSelected[key]) state.miniTestSelected[key] = {};
      state.miniTestSelected[key][blankIdx] = picked;
    });
  });

  document.querySelectorAll('.miniq-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const stepIdx = parseInt(btn.dataset.step);
      const qIdx = parseInt(btn.dataset.q);
      const optIdx = parseInt(btn.dataset.opt);
      const key = `${stepIdx}_${qIdx}`;
      const parent = btn.parentElement;
      parent.querySelectorAll('.miniq-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.miniTestSelected[key] = optIdx;
    });
  });
}

function judgeMiniTest(stepIdx) {
  const u = UNITS.find(x => x.id === state.activeUnit);
  const step = u.steps[stepIdx];
  let allCorrect = true;

  step.miniTest.forEach((q, qIdx) => {
    const key = `${stepIdx}_${qIdx}`;
    const sel = state.miniTestSelected[key];
    if (q.type === 'choice') {
      if (sel !== q.answer) allCorrect = false;
    } else if (q.type === 'fill') {
      q.answers.forEach((ans, i) => {
        if (!sel || sel[i] !== ans) allCorrect = false;
      });
    }
  });

  state.miniTestJudged[stepIdx] = true;
  state.miniTestPassed[stepIdx] = allCorrect;

  if (allCorrect) {
    const p = getProg(state.activeUnit);
    const newSteps = { ...(p.steps||{}), [stepIdx]: true };
    updateProg(state.activeUnit, { steps: newSteps });
  }

  render();
}

function retryMiniTest(stepIdx) {
  state.miniTestJudged[stepIdx] = false;
  state.miniTestPassed[stepIdx] = false;
  Object.keys(state.miniTestSelected).forEach(k => {
    if (k.startsWith(stepIdx+'_')) delete state.miniTestSelected[k];
  });
  state.miniTestPickedChip[stepIdx] = null;
  render();
}

function reviewStep(stepIdx) {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToStep(idx) {
  state.currentStep = idx;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function completeStep(stepIdx) {
  const p = getProg(state.activeUnit);
  const newSteps = { ...(p.steps||{}), [stepIdx]: true };
  updateProg(state.activeUnit, { steps: newSteps });
  const u = UNITS.find(x => x.id === state.activeUnit);
  if (stepIdx < u.steps.length - 1) state.currentStep = stepIdx + 1;
  render();
}

function renderPracticeTab(u, p) {
  const fb = u.fillBlanks[0];
  const bestTimes = (p.bestTimes || []).slice().sort((a,b) => a.time - b.time);

  let html = `
    <div class="practice-card">
      <div class="practice-head">
        <h2>穴埋めチャレンジ</h2>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="timer-display ${state.timerPaused?'paused':''}" id="timer">${formatTime(state.elapsed/1000)}</div>
        </div>
      </div>

      <div class="word-bank" id="wordBank">
        <div class="word-bank-label">▸ 語群</div>
        ${fb.bank.map(w => `<span class="word-chip" data-word="${w}">${w}</span>`).join('')}
      </div>

      <div class="fill-text" id="fillText">${buildFillTextHtml(fb)}</div>

      <div class="practice-actions">
        <button class="action-btn primary" onclick="judgePractice()">判定</button>

      </div>

    <div class="records-card">
      <h3>⏱ ベストタイム TOP5</h3>

        <ul class="record-list">

            return `<li><span class="rank">${i+1}位</span><span>${formatTime(r.time/1000)}</span><span class="date">${dt}</span></li>`;

function buildFillTextHtml(fb) {
  return fb.text.replace(/\{(\d+)\}/g, (_, idx) => {
    const i = parseInt(idx);
    return `<span class="blank" data-idx="${i}" data-answer="${fb.answers[i]}">　</span>`;
  });
}

function attachPracticeHandlers(u) {
  document.querySelectorAll('#wordBank .word-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.classList.contains('used')) return;
      document.querySelectorAll('#wordBank .word-chip.selected').forEach(c => c.classList.remove('selected'));
      if (state.practicePickedChip === chip.dataset.word) {
        state.practicePickedChip = null;
      } else {
        chip.classList.add('selected');
        state.practicePickedChip = chip.dataset.word;
      }
    });
  });

  document.querySelectorAll('.blank').forEach(blank => {
    blank.addEventListener('click', () => {
      if (blank.classList.contains('correct')) return;
      if (blank.dataset.filled) {
        const word = blank.dataset.filled;
        const chip = document.querySelector(`#wordBank .word-chip[data-word="${word}"]`);
        if (chip) chip.classList.remove('used');
        blank.dataset.filled = '';
        blank.textContent = '　';
        blank.classList.remove('filled','wrong');
        return;
      }
      if (!state.practicePickedChip) return;
      if (!state.timerId && !state.timerPaused) startTimer();
      blank.dataset.filled = state.practicePickedChip;
      blank.textContent = state.practicePickedChip;
      blank.classList.add('filled');
      blank.classList.remove('wrong');
      const chip = document.querySelector(`#wordBank .word-chip[data-word="${state.practicePickedChip}"]`);
      if (chip) { chip.classList.add('used'); chip.classList.remove('selected'); }
      state.practicePickedChip = null;
    });
  });
}

function startTimer() {
  if (state.timerId) return;
  state.startTime = Date.now() - state.elapsed;
  state.timerPaused = false;
  state.timerId = setInterval(() => {
    state.elapsed = Date.now() - state.startTime;
    const el = document.getElementById('timer');
    if (el) el.textContent = formatTime(state.elapsed/1000);
  }, 100);
}
function stopTimer() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}
function pauseTimer() {
  if (!state.timerId) return;
  state.elapsed = Date.now() - state.startTime;
  stopTimer();
  state.timerPaused = true;
}
function resumePractice() {
  state.timerPaused = false;
  startTimer();
  render();
}

function resetPractice() {
  stopTimer();
  state.elapsed = 0;
  state.timerPaused = false;
  state.practicePickedChip = null;
  render();
}

function judgePractice() {
  const blanks = [...document.querySelectorAll('.blank')];
  const empty = blanks.filter(b => !b.dataset.filled);
  if (empty.length > 0) {
    showModal({
      type: 'fail',
      title: 'まだ空欄があります',
      body: 'すべての空欄を埋めてから判定してください。',
      buttons: [{ label:'OK', primary:true, action:closeModal }]
    });
    return;
  }
  let allCorrect = true;
  blanks.forEach(b => {
    if (b.dataset.filled === b.dataset.answer) {
      b.classList.add('correct');
      b.classList.remove('wrong');
    } else {
      b.classList.add('wrong');
      b.classList.remove('correct');
      allCorrect = false;
    }
  });

  pauseTimer();

  if (allCorrect) {
    const p = getProg(state.activeUnit);
    const newRecords = [...(p.bestTimes||[]), { time: state.elapsed, date: Date.now() }]
      .sort((a,b) => a.time - b.time)
      .slice(0,5);
    updateProg(state.activeUnit, { bestTimes: newRecords });
    fireConfetti();
    showModal({
      type: 'success',
      title: '🌸 合格!',
      body: `<div class="modal-time">${formatTime(state.elapsed/1000)}</div>すべて正解です!`,
      buttons: [
        { label:'もう一度', primary:true, action: () => { closeModal(); resetPractice(); } },
        { label:'確認テストへ', action: () => { closeModal(); setTab('test'); } }
      ]
    });
  } else {
    showModal({
      type: 'fail',
      title: 'おしい!',
      body: '間違っているところがあります。説明文を確認しますか?',
      buttons: [
        { label:'説明にもどる', primary:true, action: () => { closeModal(); setTab('learn'); } },
        { label:'継続する', action: () => {
            closeModal();
            document.querySelectorAll('.blank.wrong').forEach(b => {
              const word = b.dataset.filled;
              b.dataset.filled = '';
              b.textContent = '　';
              b.classList.remove('filled','wrong');
              const chip = document.querySelector(`#wordBank .word-chip[data-word="${word}"]`);
              if (chip) chip.classList.remove('used');
            });
            startTimer();
          }
        }
      ]
    });
  }
}

function renderTestTab(u, p) {
  const quiz = u.quiz;
  const fillBank = [...new Set(quiz.filter(q => q.type==='fill').flatMap(q => q.bank || []))];

  let html = `
    <div class="practice-card">
      <h2 style="margin-top:0;">確認テスト</h2>
      <div style="color:#666;font-size:13px;margin-bottom:16px;">本単元の総まとめ。空所補充と四択の混合です。</div>
  `;
  if (fillBank.length > 0) {
    html += `
      <div class="ministep-bank" data-test="1">
        <div class="ministep-bank-label">▸ 空所補充用 語群</div>
        ${fillBank.map(w => `<span class="ministep-chip test-chip" data-word="${w}">${w}</span>`).join('')}
      </div>
    `;
  }

  quiz.forEach((q, qIdx) => {
    const sel = state.testSelected[qIdx];
    html += `<div class="quiz-question">`;
    html += `<span class="qnum">問 ${qIdx+1}</span>`;
    html += `<div class="qtext">${q.q.replace(/\{(\d+)\}/g, (_, i) => {
      if (q.type === 'fill') {
        const idx = parseInt(i);
        const val = (sel && sel[idx]) || '';
        let cls = '';
        if (state.testJudged) {
          if (val === q.answers[idx]) cls = 'correct';
          else cls = 'incorrect';
        }
        return `<span class="qfill"><input type="text" data-q="${qIdx}" data-blank="${idx}" value="${val}" readonly class="${cls}"></span>`;
      }
      return _;
    })}</div>`;
    if (q.type === 'choice') {
      html += `<div class="qopts">`;
      q.options.forEach((opt, i) => {
        let cls = 'qopt';
        if (sel === i) cls += ' selected';
        if (state.testJudged) {
          if (i === q.answer) cls += ' correct';
          else if (sel === i) cls += ' incorrect';
        }
        html += `<button class="${cls}" data-q="${qIdx}" data-opt="${i}" ${state.testJudged?'disabled':''}>
          <span class="opt-mark">${String.fromCharCode(65+i)}</span>${opt}
        </button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  html += `<div class="practice-actions" style="margin-top:14px;">`;
  if (!state.testJudged) {
    html += `<button class="action-btn primary" onclick="judgeTest()">採点する</button>`;
  } else {
    html += `<button class="action-btn primary" onclick="resetTest()">もう一度</button>`;
    html += `<button class="action-btn secondary" onclick="setTab('learn')">説明にもどる</button>`;
  }
  html += `</div>`;

  if (state.testJudged) {
    let correct = 0;
    quiz.forEach((q, qIdx) => {
      const sel = state.testSelected[qIdx];
      if (q.type === 'choice') { if (sel === q.answer) correct++; }
      else if (q.type === 'fill') {
        if (sel && q.answers.every((a, i) => sel[i] === a)) correct++;
      }
    });
    const pct = Math.round(correct / quiz.length * 100);
    let msg = '';
    if (pct === 100) msg = '🌸 満点!';
    else if (pct >= 80) msg = '👏 よくできました!';
    else if (pct >= 60) msg = '💪 もう一歩!';
    else msg = '📖 説明をもう一度読みましょう';
    html += `
      <div style="text-align:center; margin-top:20px;">
        <div class="score-display">${correct} / ${quiz.length} 正解</div>
        <div style="margin-top:10px; font-size:15px; font-weight:700;">${msg}</div>
      </div>
    `;
  }

  html += `</div>`;
  return html;
}

function attachTestHandlers(u) {
  document.querySelectorAll('.test-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.classList.contains('used')) return;
      document.querySelectorAll('.test-chip').forEach(c => c.classList.remove('selected'));
      if (state.testPickedChip === chip.dataset.word) {
        state.testPickedChip = null;
      } else {
        chip.classList.add('selected');
        state.testPickedChip = chip.dataset.word;
      }
    });
  });
  document.querySelectorAll('.qfill input').forEach(inp => {
    inp.addEventListener('click', () => {
      if (state.testJudged) return;
      const qIdx = parseInt(inp.dataset.q);
      const blankIdx = parseInt(inp.dataset.blank);
      if (inp.value) {
        const word = inp.value;
        const stillUsed = [...document.querySelectorAll('.qfill input')]
          .filter(o => o !== inp && o.value === word).length > 0;
        if (!stillUsed) {
          const chip = document.querySelector(`.test-chip[data-word="${word}"]`);
          if (chip) chip.classList.remove('used');
        }
        inp.value = '';
        if (state.testSelected[qIdx]) state.testSelected[qIdx][blankIdx] = '';
        return;
      }
      if (!state.testPickedChip) return;
      inp.value = state.testPickedChip;
      const chip = document.querySelector(`.test-chip[data-word="${state.testPickedChip}"]`);
      if (chip) { chip.classList.add('used'); chip.classList.remove('selected'); }
      if (!state.testSelected[qIdx]) state.testSelected[qIdx] = {};
      state.testSelected[qIdx][blankIdx] = state.testPickedChip;
      state.testPickedChip = null;
    });
  });
  document.querySelectorAll('.qopt').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const qIdx = parseInt(btn.dataset.q);
      const optIdx = parseInt(btn.dataset.opt);
      btn.parentElement.querySelectorAll('.qopt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.testSelected[qIdx] = optIdx;
    });
  });
}

function judgeTest() {
  state.testJudged = true;
  const u = UNITS.find(x => x.id === state.activeUnit);
  let correct = 0;
  u.quiz.forEach((q, qIdx) => {
    const sel = state.testSelected[qIdx];
    if (q.type === 'choice') { if (sel === q.answer) correct++; }
    else if (q.type === 'fill') {
      if (sel && q.answers.every((a, i) => sel[i] === a)) correct++;
    }
  });
  if (correct === u.quiz.length) {
    fireConfetti();
    updateProg(state.activeUnit, { passed: true });
  }
  render();
}

function resetTest() {
  state.testSelected = {};
  state.testJudged = false;
  state.testPickedChip = null;
  render();
}

// FLASHCARDS
// ============================================================
function getCardId(unitId, idx) {
  return `${unitId}_${idx}`;
}

function initFlashDeck() {
  // Build the deck from current unit, sync known/review from progress
  let cards = [];
  if (state.flashSummaryMode) {
    UNITS.forEach(u => {
      (u.flashcards || []).forEach((c, i) => {
        cards.push({ ...c, _id: getCardId(u.id, i), _unitId: u.id, _unitName: u.name, _unitColor: u.color, _unitColorD: u.colorD, _unitBg: u.bgColor });
      });
    });
  } else {
    const u = UNITS.find(x => x.id === state.activeUnit);
    if (!u || !u.flashcards) { state.flashDeck = []; return; }
    u.flashcards.forEach((c, i) => {
      cards.push({ ...c, _id: getCardId(u.id, i), _unitId: u.id, _unitName: u.name, _unitColor: u.color, _unitColorD: u.colorD, _unitBg: u.bgColor });
    });
  }
  // Sync known/review from progress
  state.flashKnown = new Set();
  state.flashReview = new Set();
  cards.forEach(c => {
    const prog = getProg(c._unitId);
    if ((prog.flashKnown || []).includes(c._id)) state.flashKnown.add(c._id);
    if ((prog.flashReview || []).includes(c._id)) state.flashReview.add(c._id);
  });

  // Filter by mode
  if (state.flashMode === 'review') {
    cards = cards.filter(c => state.flashReview.has(c._id));
  }

  state.flashDeck = cards;
  state.flashIndex = 0;
  state.flashFlipped = false;
}

function renderFlashTab(u, p) {
  return renderFlashUI(u);
}

function renderFlashUI(u) {
  // u is null for summary mode
  const total = state.flashSummaryMode
    ? UNITS.reduce((s,uu) => s + (uu.flashcards?.length||0), 0)
    : (u.flashcards?.length || 0);

  if (total === 0) {
    return `<div class="flash-intro"><h3>カードが用意されていません</h3><p>この単元のフラッシュカードはまだありません。</p></div>`;
  }

  // Compute counts across the whole pool (not just filtered deck)
  let knownCount = 0, reviewCount = 0;
  if (state.flashSummaryMode) {
    UNITS.forEach(uu => {
      (uu.flashcards||[]).forEach((c, i) => {
        const id = getCardId(uu.id, i);
        if (state.flashKnown.has(id)) knownCount++;
        if (state.flashReview.has(id)) reviewCount++;
      });
    });
  } else {
    (u.flashcards||[]).forEach((c, i) => {
      const id = getCardId(u.id, i);
      if (state.flashKnown.has(id)) knownCount++;
      if (state.flashReview.has(id)) reviewCount++;
    });
  }

  let html = `
    <div class="flash-intro">
      <h3>📇 フラッシュカード</h3>
      <p>カードをタップで裏返し → 「覚えた」「もう一度」で仕分けしましょう</p>
      <div class="flash-stats">
        <div class="flash-stat"><div class="label">全カード</div><div class="num">${total}</div></div>
        <div class="flash-stat known"><div class="label">覚えた</div><div class="num">${knownCount}</div></div>
        <div class="flash-stat review"><div class="label">もう一度</div><div class="num">${reviewCount}</div></div>
      </div>
    </div>
  `;

  // Mode toggle
  html += `
    <div class="flash-mode-row">
      <button class="flash-mode-btn ${state.flashMode==='all'?'active':''}" onclick="setFlashMode('all')">すべて (${total})</button>
      <button class="flash-mode-btn ${state.flashMode==='review'?'active':''}" onclick="setFlashMode('review')" ${reviewCount===0?'disabled':''}>「もう一度」のみ (${reviewCount})</button>
      <button class="flash-mode-btn" onclick="resetFlashProgress()" style="border-color:#aaa;color:#666;">仕分けをリセット</button>
    </div>
  `;

  // Auto-play controls
  const speeds = ['manual', 2, 3, 4, 5];
  const speedLabel = (s) => s === 'manual' ? '手動' : `${s}秒`;
  html += `
    <div class="flash-autoplay">
      <div class="flash-autoplay-row">
        <span class="flash-autoplay-label">⏱ 自動再生</span>
        <div class="flash-speed-wrap">
          ${speeds.map(s => `
            <button class="flash-speed-opt ${state.flashSpeed===s?'active':''}" onclick="setFlashSpeed(${typeof s==='string'?`'${s}'`:s})">${speedLabel(s)}</button>
          `).join('')}
        </div>
        ${state.flashSpeed !== 'manual' ? `
          <button class="flash-play-btn ${state.flashPlaying?'pause':'play'}" onclick="toggleFlashPlay()">
            ${state.flashPlaying ? '⏸ 一時停止' : '▶ 再生'}
          </button>` : ''}
        <label class="flash-loop-toggle">
          <input type="checkbox" ${state.flashLoop?'checked':''} onchange="toggleFlashLoop()">
          🔁 ループ
        </label>
      </div>
    </div>
  `;

  if (state.flashDeck.length === 0) {
    html += `
      <div class="flash-complete">
        <div class="flash-complete-emoji">🎉</div>
        <h3>「もう一度」のカードがありません!</h3>
        <p>すべてのカードを覚えた状態です。お疲れさまでした。</p>
        <button class="action-btn primary" onclick="setFlashMode('all')">すべてのカードに戻る</button>
      </div>
    `;
    return html;
  }

  // Done with current deck?
  if (state.flashIndex >= state.flashDeck.length) {
    const sessionKnown = state.flashDeck.filter(c => state.flashKnown.has(c._id)).length;
    const sessionReview = state.flashDeck.filter(c => state.flashReview.has(c._id)).length;
    html += `
      <div class="flash-complete">
        <div class="flash-complete-emoji">✨</div>
        <h3>1周しました!</h3>
        <p>覚えた: ${sessionKnown} 枚 / もう一度: ${sessionReview} 枚</p>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
          ${sessionReview > 0 ? `<button class="action-btn primary" onclick="setFlashMode('review')">「もう一度」だけ復習する</button>` : ''}
          <button class="action-btn secondary" onclick="restartFlash()">最初から見直す</button>
        </div>
      </div>
    `;
    return html;
  }

  const card = state.flashDeck[state.flashIndex];
  const cardCss = state.flashSummaryMode
    ? `--unit-color:${card._unitColor};--unit-color-d:${card._unitColorD};--unit-bg:${card._unitBg};--unit-glow:${card._unitColor}66`
    : '';
  const progressPct = ((state.flashIndex) / state.flashDeck.length) * 100;

  html += `<div class="flash-progress" style="${cardCss}"><div class="flash-progress-fill" style="width:${progressPct}%"></div></div>`;

  html += `
    <div class="flash-nav">
      <button class="flash-nav-btn" onclick="prevFlash()" ${state.flashIndex===0?'disabled':''}>‹</button>
      <div class="flash-counter">${state.flashIndex+1} / ${state.flashDeck.length}</div>
      <button class="flash-nav-btn" onclick="nextFlash()" ${state.flashIndex>=state.flashDeck.length-1?'disabled':''}>›</button>
    </div>
  `;

  const tagLabel = card.type === 'term' ? 'ミス注意' : 'Q&A';
  const tagClass = card.type === 'term' ? 'term' : 'qa';
  const unitTag = state.flashSummaryMode ? `<div style="font-size:10px;color:#888;margin-bottom:6px;letter-spacing:1px;">${card._unitName}</div>` : '';

  html += `
    <div class="flashcard-wrap" style="${cardCss}">
      <div class="flashcard ${state.flashFlipped?'flipped':''} ${state.flashPlaying?'auto-playing':''}" onclick="flipFlash()">
        <div class="flashcard-face front">
          ${unitTag}
          <span class="flashcard-tag ${tagClass}">${tagLabel}</span>
          <div class="flashcard-front-text">${escapeHtml(card.front)}</div>
          <div class="flashcard-flip-hint">タップで答えを見る</div>
        </div>
        <div class="flashcard-face back">
          ${unitTag}
          <span class="flashcard-tag ${tagClass}">${tagLabel}</span>
          <div class="flashcard-back-text">${formatBody(card.back || '')}</div>
          ${card.mistake ? `
            <div class="flashcard-mistake">
              <div class="flashcard-mistake-label">⚠ ミス注意ポイント</div>
              ${formatBody(card.mistake)}
            </div>` : ''}
          <div class="flashcard-flip-hint">タップで戻る</div>
        </div>
      </div>
    </div>
  `;

  // Action buttons (only show after flip)
  html += `
    <div class="flash-actions">
      <button class="flash-action-btn review" onclick="markFlash('review')">🔁 もう一度</button>
      <button class="flash-action-btn known" onclick="markFlash('known')">✓ 覚えた</button>
    </div>
  `;

  return html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function flipFlash() {
  // While auto-playing, manual flip should pause to give user control
  if (state.flashPlaying) {
    pauseFlashPlay();
  }
  state.flashFlipped = !state.flashFlipped;
  render();
}

function nextFlash() {
  if (state.flashIndex < state.flashDeck.length - 1) {
    state.flashIndex++;
    state.flashFlipped = false;
    render();
  } else if (state.flashIndex === state.flashDeck.length - 1) {
    // Move to "complete" state
    state.flashIndex++;
    render();
  }
}

function prevFlash() {
  if (state.flashIndex > 0) {
    state.flashIndex--;
    state.flashFlipped = false;
    render();
  }
}

function markFlash(action) {
  const card = state.flashDeck[state.flashIndex];
  if (!card) return;
  const id = card._id;
  if (action === 'known') {
    state.flashKnown.add(id);
    state.flashReview.delete(id);
  } else {
    state.flashReview.add(id);
    state.flashKnown.delete(id);
  }
  // Persist to that unit's progress
  const prog = getProg(card._unitId);
  const known = (prog.flashKnown || []).filter(x => x !== id);
  const review = (prog.flashReview || []).filter(x => x !== id);
  if (action === 'known') known.push(id);
  else review.push(id);
  updateProg(card._unitId, { flashKnown: known, flashReview: review });

  // If auto-playing, pause briefly so user sees their action register, then continue
  // (we don't pause auto-play permanently — manual mark is just an interjection)
  // Auto-advance to next card
  state.flashIndex++;
  state.flashFlipped = false;

  // Reset timer if auto-playing (so the new card gets a fresh full duration)
  if (state.flashPlaying) {
    clearFlashTimer();
    render();
    scheduleFlashTick();
  } else {
    render();
  }
}

// ----- Auto-play controls -----
function clearFlashTimer() {
  if (state.flashTimerId) {
    clearTimeout(state.flashTimerId);
    state.flashTimerId = null;
  }
}

function scheduleFlashTick() {
  clearFlashTimer();
  if (!state.flashPlaying || state.flashSpeed === 'manual') return;
  const ms = state.flashSpeed * 1000;
  state.flashTimerId = setTimeout(autoPlayTick, ms);
}

function autoPlayTick() {
  state.flashTimerId = null;
  if (!state.flashPlaying) return;

  // If we're past the end, handle loop or stop
  if (state.flashIndex >= state.flashDeck.length) {
    if (state.flashLoop) {
      state.flashIndex = 0;
      state.flashFlipped = false;
      render();
      scheduleFlashTick();
    } else {
      state.flashPlaying = false;
      render();
    }
    return;
  }

  if (!state.flashFlipped) {
    // Front showing → flip to back
    state.flashFlipped = true;
    render();
    scheduleFlashTick();
  } else {
    // Back showing → advance to next card
    state.flashIndex++;
    state.flashFlipped = false;
    if (state.flashIndex >= state.flashDeck.length) {
      // End reached on this tick
      if (state.flashLoop) {
        state.flashIndex = 0;
        render();
        scheduleFlashTick();
      } else {
        state.flashPlaying = false;
        render();
      }
    } else {
      render();
      scheduleFlashTick();
    }
  }
}

function setFlashSpeed(speed) {
  state.flashSpeed = speed;
  if (speed === 'manual') {
    pauseFlashPlay();
  } else if (state.flashPlaying) {
    // Re-schedule with new speed
    scheduleFlashTick();
  }
  render();
}

function toggleFlashPlay() {
  if (state.flashSpeed === 'manual') return;
  if (state.flashPlaying) {
    pauseFlashPlay();
  } else {
    startFlashPlay();
  }
}

function startFlashPlay() {
  // If at completion screen and no loop, restart from beginning
  if (state.flashIndex >= state.flashDeck.length) {
    state.flashIndex = 0;
    state.flashFlipped = false;
  }
  state.flashPlaying = true;
  render();
  scheduleFlashTick();
}

function pauseFlashPlay() {
  state.flashPlaying = false;
  clearFlashTimer();
  render();
}

function toggleFlashLoop() {
  state.flashLoop = !state.flashLoop;
  render();
}

function setFlashMode(mode) {
  pauseFlashPlay();
  state.flashMode = mode;
  initFlashDeck();
  render();
}

function restartFlash() {
  state.flashIndex = 0;
  state.flashFlipped = false;
  render();
}

function resetFlashProgress() {
  if (!confirm('「覚えた / もう一度」の仕分けをリセットしますか?')) return;
  if (state.flashSummaryMode) {
    UNITS.forEach(u => {
      updateProg(u.id, { flashKnown: [], flashReview: [] });
    });
  } else {
    updateProg(state.activeUnit, { flashKnown: [], flashReview: [] });
  }
  state.flashKnown.clear();
  state.flashReview.clear();
  state.flashMode = 'all';
  initFlashDeck();
  render();
}

// ============================================================
// SUMMARY VIEW (全体まとめ)
// ============================================================
function openSummaryFlash() {
  state.view = 'summary';
  state.flashSummaryMode = true;
  state.flashMode = 'all';
  state.flashPlaying = false;
  clearFlashTimer();
  initFlashDeck();
  render();
  window.scrollTo(0,0);
}

function backToDashboardFromSummary() {
  pauseFlashPlay();
  state.flashSummaryMode = false;
  state.view = 'dashboard';
  render();
}

function renderSummary() {
  const cssVars = `--unit-color:#8B5CF6;--unit-color-d:#6D28D9;--unit-bg:#EDE9FE;--unit-glow:#8B5CF666`;
  let html = `<div class="container" style="${cssVars}">`;
  html += `<button class="back-btn" onclick="backToDashboardFromSummary()">← 単元表に戻る</button>`;
  html += `
    <div class="summary-header">
      <h2>📇 全体まとめ フラッシュカード</h2>
      <p>全単元の重要ポイント・ミス注意ポイントを横断的に確認できます。試験前の総復習にどうぞ。</p>
    </div>
  `;
  html += renderFlashUI(null);
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

render();
</script>

</body>
</html>
